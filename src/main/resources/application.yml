spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: rootuser
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    logging:
      level:
        org.hibernate.SQL: debug             # SQL 로그 레벨
        org.hibernate.type.descriptor.sql: trace  # 파라미터 값까지 출력
